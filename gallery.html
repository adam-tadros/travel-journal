<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>gallery — Adam Tadros</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#fbf8f1;
    --ink:#1a1814;
    --muted:#8a8177;
    --mark:#b89968;
    --rule:#e3dccd;
    --tile:#eae2d0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'EB Garamond', Georgia, serif;
    color:var(--ink);
    background:var(--paper);
    font-size:19px;
    line-height:1.65;
  }
  a{color:inherit}

  nav.top{
    position:sticky;top:0;z-index:100;
    background:rgba(251,248,241,0.92);
    backdrop-filter:blur(6px);
    padding:14px 40px;
    display:flex;justify-content:space-between;align-items:baseline;
    border-bottom:1px solid var(--rule);
    font-size:14px;
  }
  nav.top a{
    text-decoration:none;color:var(--muted);
    margin-left:22px;font-style:italic;
  }
  nav.top a:hover{color:var(--ink)}
  nav.top .name{color:var(--ink)}

  main{
    max-width:1200px;
    margin:0 auto;
    padding:80px 30px 120px;
  }

  .cover{
    padding:40px 0 60px;
    border-bottom:1px solid var(--rule);
    margin-bottom:40px;
  }
  .cover h1{
    font-size:38px;
    font-weight:400;
    line-height:1.15;
    letter-spacing:-0.5px;
    margin-bottom:16px;
  }
  .cover .by{
    color:var(--muted);
    font-size:17px;
    font-style:italic;
    margin-top:14px;
  }

  /* grid: flexbox columns so we can control row-major ordering via JS */
  .grid{
    display:flex;
    gap:12px;
    margin-top:24px;
  }
  .grid .col{
    flex:1 1 0;
    min-width:0;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .grid figure{
    margin:0;
    background:var(--tile);
    border:1px solid var(--rule);
    overflow:hidden;
    cursor:zoom-in;
    transition:transform 0.2s ease, box-shadow 0.2s ease;
  }
  .grid figure:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 18px rgba(26,24,20,0.08);
  }
  .grid img{
    display:block;
    width:100%;
    height:auto;
  }
  .grid figcaption{
    padding:6px 10px 8px;
    font-size:13px;
    font-style:italic;
    color:var(--muted);
    line-height:1.35;
    background:var(--paper);
    border-top:1px solid var(--rule);
  }

  /* lightbox */
  .lightbox{
    position:fixed;inset:0;
    background:rgba(26,24,20,0.92);
    display:none;
    align-items:center;justify-content:center;
    z-index:1000;
    padding:40px;
    cursor:zoom-out;
  }
  .lightbox.open{display:flex}
  .lightbox .stage{
    max-width:100%;
    max-height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
  }
  .lightbox img{
    max-width:100%;
    max-height:calc(100vh - 160px);
    object-fit:contain;
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
  }
  .lightbox .caption{
    color:#fbf8f1;
    font-size:15px;
    font-style:italic;
    opacity:0.85;
    text-align:center;
    max-width:80ch;
  }
  .lightbox .close{
    position:absolute;top:20px;right:28px;
    font-size:28px;color:#fbf8f1;
    cursor:pointer;font-style:italic;
    opacity:0.7;
  }
  .lightbox .close:hover{opacity:1}
  .lightbox .nav{
    position:absolute;top:50%;transform:translateY(-50%);
    font-size:40px;color:#fbf8f1;
    cursor:pointer;
    background:none;border:none;
    padding:20px;
    opacity:0.6;
    font-family:inherit;
  }
  .lightbox .nav:hover{opacity:1}
  .lightbox .nav.prev{left:20px}
  .lightbox .nav.next{right:20px}

  footer{
    margin-top:120px;
    padding-top:40px;
    border-top:1px solid var(--rule);
    text-align:center;
    font-size:17px;
    font-style:italic;
    color:var(--muted);
  }

  @media (max-width:700px){
    nav.top{padding:12px 20px;font-size:13px}
    nav.top a{margin-left:16px}
    main{padding:50px 24px 80px}
    .cover h1{font-size:30px}
    .grid{gap:8px}
    .grid .col{gap:8px}
    .lightbox{padding:20px}
    .lightbox .nav{font-size:30px;padding:12px}
  }
</style>
</head>
<body>

<nav class="top">
  <span class="name">Adam Tadros</span>
  <span>
    <a href="index.html">journal</a>
    <a href="gallery.html">gallery</a>
  </span>
</nav>

<main>

  <section class="cover">
    <h1>gallery</h1>
    <div class="by">Adam Tadros</div>
  </section>

  <div class="grid" id="grid"></div>

  <footer>
    Adam Tadros
  </footer>

</main>

<div class="lightbox" id="lightbox" role="dialog" aria-hidden="true">
  <span class="close" id="lb-close" aria-label="close">close</span>
  <button class="nav prev" id="lb-prev" aria-label="previous">‹</button>
  <div class="stage">
    <img id="lb-img" alt="">
    <div class="caption" id="lb-cap"></div>
  </div>
  <button class="nav next" id="lb-next" aria-label="next">›</button>
</div>

<script>
  // ---- gallery data ----
  // Order matters: items are laid out row-by-row, left-to-right, top-to-bottom.
  // Excluded from gallery (per Adam): Henry Cavill moustache (haircut ref) and 63.5 (Jack's text).
  const items = [
    // Grand Canyon (1-6)
    { src: "images/1.jpg" },

    { src: "images/4.jpg" },

    { src: "images/6.jpg" },

    // Boulder (7-8)
    { src: "images/7.jpg" },
    { src: "images/8.jpg" },

    // Washington / Olympic NP (9-18)
    { src: "images/9.jpg" },

    { src: "images/11.jpg" },
    { src: "images/12.jpg" },
    { src: "images/13.jpg" },
    { src: "images/14.jpg" },
    { src: "images/15.jpg" },

    { src: "images/17.jpg" },
    { src: "images/18.jpg", caption: "Wally the dryheaving cat" },

    // Paris (19-21)
    { src: "images/19.jpg" },

    { src: "images/21.jpg" },

    // Morocco (22-33)
    { src: "images/22.jpg" },
    { src: "images/23.jpg" },
    { src: "images/24.jpg" },

    { src: "images/27.jpg" },
    { src: "images/28.jpg" },
    { src: "images/28_5.jpg" },
    { src: "images/28_55.jpg" },
    { src: "images/29.jpg" },
    { src: "images/29_5.jpg" },
    { src: "images/30.jpg" },
    { src: "images/30_5.jpg" },
    { src: "images/31.jpg" },
    { src: "images/31_5.jpg", caption: "the haircut I got" },
    { src: "images/32.jpg" },

    // Egypt (34-39)
    { src: "images/34.jpg" },

    { src: "images/77.jpg" }
  ];

  // ---- responsive column count ----
  function colCount(){
    const w = window.innerWidth;
    if (w < 480) return 1;
    if (w < 700) return 2;
    if (w < 1000) return 3;
    return 4;
  }

  const grid = document.getElementById('grid');

  function render(){
    const n = colCount();
    grid.innerHTML = '';
    const cols = [];
    for (let i = 0; i < n; i++){
      const c = document.createElement('div');
      c.className = 'col';
      grid.appendChild(c);
      cols.push(c);
    }
    items.forEach((it, i) => {
      const fig = document.createElement('figure');
      fig.dataset.index = String(i);
      const img = document.createElement('img');
      img.src = it.src;
      img.alt = it.caption || '';
      img.loading = 'lazy';
      fig.appendChild(img);
      if (it.caption){
        const cap = document.createElement('figcaption');
        cap.textContent = it.caption;
        fig.appendChild(cap);
      }
      fig.addEventListener('click', () => open(i));
      cols[i % n].appendChild(fig);
    });
  }

  let resizeTimer = null;
  let currentCols = colCount();
  window.addEventListener('resize', () => {
    const n = colCount();
    if (n === currentCols) return;
    currentCols = n;
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(render, 80);
  });

  render();

  // ---- lightbox ----
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lb-img');
  const lbCap = document.getElementById('lb-cap');
  const lbClose = document.getElementById('lb-close');
  const lbPrev = document.getElementById('lb-prev');
  const lbNext = document.getElementById('lb-next');
  let current = 0;

  function show(i){
    current = (i + items.length) % items.length;
    const it = items[current];
    lbImg.src = it.src;
    lbCap.textContent = it.caption || '';
    lbCap.style.display = it.caption ? '' : 'none';
  }
  function open(i){
    show(i);
    lb.classList.add('open');
    lb.setAttribute('aria-hidden','false');
    document.body.style.overflow = 'hidden';
  }
  function close(){
    lb.classList.remove('open');
    lb.setAttribute('aria-hidden','true');
    document.body.style.overflow = '';
  }
  function next(){ show(current + 1); }
  function prev(){ show(current - 1); }

  lbClose.addEventListener('click', close);
  lbPrev.addEventListener('click', (e) => { e.stopPropagation(); prev(); });
  lbNext.addEventListener('click', (e) => { e.stopPropagation(); next(); });
  lb.addEventListener('click', (e) => {
    if (e.target === lb || e.target === lbImg || e.target === lbCap) close();
  });

  document.addEventListener('keydown', (e) => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') close();
    else if (e.key === 'ArrowRight') next();
    else if (e.key === 'ArrowLeft') prev();
  });
</script>

</body>
</html>
